<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTO Logística - Laboratórios Medclin</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
body { background: #f1f5f9; }

/* Sidebar */
.sidebar { background: linear-gradient(180deg, #1e3a5f 0%, #0d1f33 100%); min-height: 100vh; width: 240px; flex-shrink: 0; }
.sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,0.65); border-radius: 8px; margin: 2px 8px; cursor: pointer; transition: all .2s; font-size: 14px; }
.sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.12); }
.sidebar-link i { width: 18px; text-align: center; }

/* Cards */
.card { background: #fff; border-radius: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

/* Status badges */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-pending   { background: #fef3c7; color: #92400e; }
.badge-progress  { background: #d1fae5; color: #065f46; }
.badge-completed { background: #e0e7ff; color: #3730a3; }
.badge-approved  { background: #d1fae5; color: #065f46; }
.badge-rejected  { background: #fee2e2; color: #991b1b; }
.badge-released  { background: #dbeafe; color: #1e40af; }

/* Call cards */
.call-card { border-left: 4px solid #fbbf24; }
.call-card.in_progress { border-left-color: #10b981; background: #f0fdf4; }
.call-card.completed { border-left-color: #6366f1; opacity: .75; }
.call-card.emergency { border-left-color: #ef4444; }
.call-card.urgent { border-left-color: #f97316; }

/* Stat cards */
.stat-card { background: #fff; border-radius: 14px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
.form-input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; }
.form-input:focus { border-color: #1e3a5f; box-shadow: 0 0 0 2px rgba(30,58,95,.1); }
select.form-input { background-color: #fff; }

/* Buttons */
.btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-primary { background: #1e3a5f; color: #fff; }
.btn-primary:hover { background: #0d1f33; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }
.btn-danger  { background: #ef4444; color: #fff; }
.btn-danger:hover  { background: #dc2626; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-outline { background: transparent; border: 1.5px solid #1e3a5f; color: #1e3a5f; }
.btn-outline:hover { background: #f0f4f8; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.modal-lg { max-width: 720px; }

/* Avisos */
.avisos-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px; padding: 16px; margin-top: 16px; }
.avisos-box h4 { font-weight: 700; color: #92400e; margin-bottom: 8px; font-size: 14px; }
.avisos-box li { font-size: 13px; color: #78350f; margin-bottom: 4px; line-height: 1.5; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* Pulse animation for pending */
@keyframes pulse-ring { 0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0} }
.pulse { animation: pulse-ring 1.5s ease-out infinite; }

/* Sound indicator */
#soundIndicator { position: fixed; top: 16px; right: 16px; background: #ef4444; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; display: none; }

/* Hidden */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Sound Indicator -->
<div id="soundIndicator"><i class="fas fa-bell mr-2"></i>Chamados Pendentes</div>

<!-- ================================================
     LOGIN PAGE
     ================================================ -->
<div id="loginPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 to-blue-950 p-4">
  <div class="w-full max-w-sm">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white shadow-lg mb-4">
        <i class="fas fa-truck-medical text-blue-900 text-3xl"></i>
      </div>
      <h1 class="text-white text-2xl font-bold leading-tight">NTO Logística Laboratorial</h1>
      <p class="text-blue-300 text-sm mt-1">Laboratórios Medclin</p>
    </div>

    <!-- Login Card -->
    <div class="card p-6">
      <h2 class="text-gray-800 font-bold text-lg mb-5">Acesso ao Sistema</h2>
      <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary w-full mt-2" onclick="doLogin()">
        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
      </button>
    </div>

    <p class="text-center text-blue-400 text-xs mt-6">Desenvolvido por <span class="text-white font-semibold">CRSystems</span></p>
  </div>
</div>

<!-- ================================================
     MAIN APP
     ================================================ -->
<div id="mainApp" class="hidden flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="sidebar flex flex-col">
    <!-- Logo -->
    <div class="p-4 border-b border-blue-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-blue-500 flex items-center justify-center">
          <i class="fas fa-truck-medical text-white text-base"></i>
        </div>
        <div>
          <div class="text-white font-bold text-sm leading-tight">NTO Logística</div>
          <div class="text-blue-300 text-xs">Medclin</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-3 overflow-y-auto" id="sidebarNav"></nav>

    <!-- User Info -->
    <div class="p-3 border-t border-blue-800">
      <div class="flex items-center gap-3 mb-2 px-2">
        <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white text-sm font-bold" id="userAvatar"></div>
        <div class="flex-1 min-w-0">
          <div class="text-white text-sm font-semibold truncate" id="userName"></div>
          <div class="text-blue-300 text-xs truncate" id="userRole"></div>
        </div>
      </div>
      <button class="sidebar-link w-full" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
      <p class="text-blue-500 text-center text-xs mt-2">CRSystems</p>
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 overflow-y-auto">
    <!-- Top bar -->
    <div class="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-10">
      <div>
        <h2 class="font-bold text-gray-800" id="pageTitle">Dashboard</h2>
        <p class="text-gray-400 text-xs" id="pageSubtitle"></p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-gray-400 text-sm" id="clockDisplay"></span>
      </div>
    </div>

    <!-- View Container -->
    <div class="p-6" id="viewContainer">
      <div class="flex items-center justify-center h-64">
        <div class="text-center text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
          <p>Carregando...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ================================================
     MODAL CONTAINER
     ================================================ -->
<div id="modalContainer"></div>

<script>
// ================================================
// STATE
// ================================================
const API = '/api';
let state = {
  user: null,
  token: null,
  view: 'dashboard',
  pendingCallIds: new Set(),
  pendingShipIds: new Set(),
  pendingExpIds: new Set(),
  soundInterval: null,
  pollInterval: null,
  hasPendingCalls: false,
};

const ROLE_LABELS = {
  admin: 'Administrador', driver: 'Motorista', emergency: 'Unidade de Emergência',
  sector: 'Setor Interno', approval: 'Aprovador', financial: 'Financeiro'
};

const STATUS_LABELS = {
  pending: 'Pendente', in_progress: 'Em Andamento', completed: 'Concluído',
  cancelled: 'Cancelado', approved: 'Aprovado', rejected: 'Rejeitado', released: 'Liberado'
};

const PRIORITY_LABELS = { normal: 'Normal', urgent: 'Urgente', emergency: 'Emergência' };

// ================================================
// CLOCK
// ================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('pt-BR');
}
setInterval(updateClock, 1000);
updateClock();

// ================================================
// SOUND
// ================================================
function playBeep(freq = 880, dur = 180) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
    osc.start(); osc.stop(ctx.currentTime + dur/1000);
  } catch(e) {}
}

function playNotification() {
  playBeep(880, 150);
  setTimeout(() => playBeep(1100, 200), 200);
}

function playDoubleBeep() {
  playBeep(660, 200);
  setTimeout(() => playBeep(660, 200), 300);
}

function startPendingCallsSound() {
  if (state.soundInterval) return;
  playNotification();
  document.getElementById('soundIndicator').style.display = 'block';
  state.soundInterval = setInterval(() => {
    if (state.hasPendingCalls) playNotification();
    else stopPendingCallsSound();
  }, 3 * 60 * 1000); // 3 minutos
}

function stopPendingCallsSound() {
  clearInterval(state.soundInterval);
  state.soundInterval = null;
  document.getElementById('soundIndicator').style.display = 'none';
}

// ================================================
// API HELPERS
// ================================================
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res = await fetch(API + path, { ...options, headers: { ...headers, ...(options.headers || {}) } });
  const text = await res.text();
  try { return { ok: res.ok, status: res.status, data: JSON.parse(text) }; }
  catch { return { ok: res.ok, status: res.status, data: { detail: text } }; }
}

async function apiGet(path)         { return api(path); }
async function apiPost(path, body)  { return api(path, { method: 'POST',  body: JSON.stringify(body) }); }
async function apiPut(path, body)   { return api(path, { method: 'PUT',   body: JSON.stringify(body) }); }

// ================================================
// AUTH
// ================================================
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.classList.add('hidden');

  if (!email || !password) { showLoginError('Preencha e-mail e senha.'); return; }

  const r = await apiPost('/auth.php?action=login', { email, password });
  if (!r.ok) { showLoginError(r.data.detail || 'Credenciais inválidas'); return; }

  state.token = r.data.token;
  state.user  = r.data.user;
  localStorage.setItem('nto_token', state.token);
  localStorage.setItem('nto_user',  JSON.stringify(state.user));
  enterApp();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.classList.remove('hidden');
}

function doLogout() {
  state.token = null; state.user = null;
  stopPendingCallsSound();
  clearInterval(state.pollInterval);
  localStorage.removeItem('nto_token');
  localStorage.removeItem('nto_user');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

function enterApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');

  document.getElementById('userAvatar').textContent = state.user.name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent   = state.user.name;
  document.getElementById('userRole').textContent   = ROLE_LABELS[state.user.role] || state.user.role;

  renderNav();
  navigateTo(defaultView());
  startPolling();
}

function defaultView() {
  const r = state.user.role;
  if (r === 'driver')    return 'chamados';
  if (r === 'emergency') return 'chamados';
  if (r === 'sector')    return 'envios';
  if (r === 'approval')  return 'despesas';
  if (r === 'financial') return 'despesas';
  return 'dashboard';
}

// ================================================
// NAVIGATION
// ================================================
const NAV_ITEMS = [
  { id: 'dashboard', label: 'Dashboard',       icon: 'fa-chart-bar',    roles: ['admin'] },
  { id: 'chamados',  label: 'Chamados',         icon: 'fa-bell',         roles: ['admin','driver','emergency'] },
  { id: 'envios',    label: 'Envios / Retiradas',icon: 'fa-box',         roles: ['admin','driver','sector'] },
  { id: 'despesas',  label: 'Despesas',         icon: 'fa-dollar-sign',  roles: ['admin','sector','approval','financial'] },
  { id: 'relatorios',label: 'Relatórios',       icon: 'fa-file-alt',     roles: ['admin','approval','financial'] },
  { id: 'usuarios',  label: 'Usuários',         icon: 'fa-users',        roles: ['admin'] },
];

function renderNav() {
  const role = state.user.role;
  const html = NAV_ITEMS
    .filter(n => n.roles.includes(role))
    .map(n => `
      <div class="sidebar-link" id="nav-${n.id}" onclick="navigateTo('${n.id}')">
        <i class="fas ${n.icon}"></i> ${n.label}
      </div>`)
    .join('');
  document.getElementById('sidebarNav').innerHTML = html;
}

function navigateTo(view) {
  state.view = view;
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + view);
  if (el) el.classList.add('active');

  const titles = {
    dashboard: ['Dashboard', 'Visão geral do sistema'],
    chamados:  ['Chamados', 'Retirada de Amostras'],
    envios:    ['Envios / Retiradas', 'Demandas de logística'],
    despesas:  ['Despesas', 'Solicitações financeiras'],
    relatorios:['Relatórios', 'Análises e exportações'],
    usuarios:  ['Usuários', 'Gerenciamento de acesso'],
  };
  const [title, sub] = titles[view] || ['', ''];
  document.getElementById('pageTitle').textContent    = title;
  document.getElementById('pageSubtitle').textContent = sub;

  const views = { dashboard: renderDashboard, chamados: renderChamados, envios: renderEnvios, despesas: renderDespesas, relatorios: renderRelatorios, usuarios: renderUsuarios };
  if (views[view]) views[view]();
}

function setView(html) {
  document.getElementById('viewContainer').innerHTML = html;
}

function loading() {
  setView(`<div class="flex items-center justify-center h-64">
    <div class="text-center text-gray-400"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Carregando...</p></div>
  </div>`);
}

// ================================================
// POLLING
// ================================================
function startPolling() {
  clearInterval(state.pollInterval);
  state.pollInterval = setInterval(poll, 10000);
  poll();
}

async function poll() {
  const role = state.user?.role;
  if (!role) return;

  // Chamados — para drivers e admin
  if (['admin','driver','emergency'].includes(role)) {
    const r = await apiGet('/calls.php?action=pending');
    if (r.ok) {
      const calls = r.data;
      const pending = calls.filter(c => c.status === 'pending');
      const newIds  = pending.map(c => c.id);
      const isNew   = newIds.some(id => !state.pendingCallIds.has(id));

      state.hasPendingCalls = pending.length > 0;

      if (pending.length > 0 && ['admin','driver'].includes(role)) {
        if (isNew || !state.soundInterval) startPendingCallsSound();
      } else {
        stopPendingCallsSound();
      }
      state.pendingCallIds = new Set(newIds);
    }
  }

  // Envios — motoristas
  if (['admin','driver','sector'].includes(role)) {
    const r = await apiGet('/shipments.php?action=pending');
    if (r.ok) {
      const pending = r.data.filter(s => s.status === 'pending');
      const newIds  = pending.map(s => s.id);
      const isNew   = newIds.some(id => !state.pendingShipIds.has(id));
      if (isNew && ['admin','driver'].includes(role)) playDoubleBeep();
      state.pendingShipIds = new Set(newIds);
    }
  }

  // Despesas — approval e financial
  if (['admin','approval','financial'].includes(role)) {
    const r = await apiGet('/expenses.php?status=pending');
    if (r.ok) {
      const pending = r.data.filter(e => e.status === 'pending');
      const newIds  = pending.map(e => e.id);
      const isNew   = newIds.some(id => !state.pendingExpIds.has(id));
      if (isNew) playDoubleBeep();
      state.pendingExpIds = new Set(newIds);
    }
  }
}

// ================================================
// VIEW: DASHBOARD
// ================================================
async function renderDashboard() {
  loading();
  const [callsR, shipsR, expsR] = await Promise.all([
    apiGet('/calls.php'), apiGet('/shipments.php'), apiGet('/expenses.php')
  ]);

  const calls = callsR.ok ? callsR.data : [];
  const ships = shipsR.ok ? shipsR.data : [];
  const exps  = expsR.ok  ? expsR.data  : [];

  const countBy = (arr, key, val) => arr.filter(i => i[key] === val).length;

  setView(`
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      ${statCard('Chamados Pendentes',  countBy(calls,'status','pending'),  'fa-bell',         '#fbbf24', '#fffbeb')}
      ${statCard('Em Andamento',        countBy(calls,'status','in_progress'),'fa-truck',      '#10b981', '#f0fdf4')}
      ${statCard('Envios Pendentes',    countBy(ships,'status','pending'),  'fa-box',          '#6366f1', '#eef2ff')}
      ${statCard('Despesas Pendentes',  countBy(exps,'status','pending'),   'fa-dollar-sign',  '#ef4444', '#fef2f2')}
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Últimos Chamados -->
      <div class="card p-5">
        <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-bell text-yellow-500 mr-2"></i>Últimos Chamados</h3>
        ${calls.slice(0,5).map(c => `
          <div class="flex items-center justify-between py-2 border-b last:border-0">
            <div>
              <p class="font-semibold text-sm text-gray-800">${c.origin_name}</p>
              <p class="text-xs text-gray-400">${fmtDate(c.created_at)}</p>
            </div>
            <span class="badge badge-${badgeClass(c.status)}">${STATUS_LABELS[c.status]||c.status}</span>
          </div>`).join('') || '<p class="text-gray-400 text-sm">Nenhum chamado</p>'}
      </div>

      <!-- Últimas Despesas -->
      <div class="card p-5">
        <h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-dollar-sign text-red-400 mr-2"></i>Últimas Despesas</h3>
        ${exps.slice(0,5).map(e => `
          <div class="flex items-center justify-between py-2 border-b last:border-0">
            <div>
              <p class="font-semibold text-sm text-gray-800">${e.beneficiario || e.created_by_name}</p>
              <p class="text-xs text-gray-400">${fmtMoney(e.amount)}</p>
            </div>
            <span class="badge badge-${badgeClass(e.status)}">${STATUS_LABELS[e.status]||e.status}</span>
          </div>`).join('') || '<p class="text-gray-400 text-sm">Nenhuma despesa</p>'}
      </div>
    </div>
  `);
}

function statCard(label, value, icon, iconColor, iconBg) {
  return `<div class="stat-card">
    <div class="stat-icon" style="background:${iconBg};color:${iconColor}"><i class="fas ${icon}"></i></div>
    <div>
      <div class="text-2xl font-bold text-gray-800">${value}</div>
      <div class="text-gray-400 text-xs">${label}</div>
    </div>
  </div>`;
}

// ================================================
// VIEW: CHAMADOS
// ================================================
async function renderChamados() {
  loading();
  const r = await apiGet('/calls.php');
  if (!r.ok) { setView('<p class="text-red-500">Erro ao carregar chamados.</p>'); return; }

  const calls   = r.data;
  const role    = state.user.role;
  const canCreate = ['admin','emergency','sector'].includes(role);
  const canAssume = ['admin','driver'].includes(role);

  setView(`
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-gray-700">Total: ${calls.length} chamados</h3>
      ${canCreate ? `<button class="btn btn-primary btn-sm" onclick="openChamadoForm()"><i class="fas fa-plus mr-1"></i>Novo Chamado</button>` : ''}
    </div>
    <div class="space-y-3">
      ${calls.length === 0 ? '<div class="card p-8 text-center text-gray-400">Nenhum chamado encontrado</div>' :
        calls.map(c => callCard(c, canAssume)).join('')}
    </div>
  `);
}

function callCard(c, canAssume) {
  const isProgress  = c.status === 'in_progress';
  const isCompleted = c.status === 'completed';
  const prioClass   = c.priority === 'emergency' ? 'emergency' : c.priority === 'urgent' ? 'urgent' : '';
  const cardClass   = isProgress ? 'in_progress' : isCompleted ? 'completed' : prioClass;

  return `
  <div class="card p-4 call-card ${cardClass}">

async function renderEnvios() {
  loading();
  const r = await apiGet('/shipments.php');
  if (!r.ok) { setView('<p class="text-red-500">Erro ao carregar envios.</p>'); return; }

  const ships   = r.data;
  const role    = state.user.role;
  const canCreate = ['admin','sector'].includes(role);
  const canAssume = ['admin','driver'].includes(role);

  setView(`
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-gray-700">Total: ${ships.length} demandas</h3>

  const isProgress  = s.status === 'in_progress';
  const isCompleted = s.status === 'completed';
  const typeLabel   = s.type === 'send' ? 'Envio' : 'Retirada';
  const typeIcon    = s.type === 'send' ? 'fa-arrow-right' : 'fa-arrow-left';
  const prioStyle   = s.priority === 'urgent' ? 'border-left-color:#f97316' : 'border-left-color:#6366f1';

  return `
  <div class="card p-4 call-card ${isProgress ? 'in_progress' : isCompleted ? 'completed' : ''}" style="${!isProgress && !isCompleted ? prioStyle : ''}">
    <div class="flex items-start justify-between gap-3">
      <div class="flex-1">
        <div class="flex items-center gap-2 flex-wrap mb-1">
          <span class="badge" style="background:#e0e7ff;color:#3730a3"><i class="fas ${typeIcon} mr-1"></i>${typeLabel}</span>
          <span class="font-bold text-gray-800">${escHtml(s.origin_sector)}</span>
          <i class="fas fa-arrow-right text-gray-400 text-xs"></i>
          <span class="font-semibold text-gray-700">${escHtml(s.destination_name)}</span>
          <span class="badge badge-${badgeClass(s.status)}">${STATUS_LABELS[s.status]||s.status}</span>
          ${s.priority === 'urgent' ? `<span class="badge" style="background:#fee2e2;color:#991b1b">Urgente</span>` : ''}
        </div>
        ${s.description ? `<p class="text-sm text-gray-500 mt-1">${escHtml(s.description)}</p>` : ''}
        ${isProgress ? `<p class="text-sm text-green-700 font-semibold mt-1"><i class="fas fa-user mr-1"></i>Motorista: ${escHtml(s.assigned_driver_name||'')}</p>` : ''}
        ${isCompleted ? `<p class="text-sm text-indigo-600 font-semibold mt-1"><i class="fas fa-check-circle mr-1"></i>Concluído por: ${escHtml(s.assigned_driver_name||'')}</p>` : ''}
      </div>
      <div class="text-right flex-shrink-0">
        <p class="text-xs text-gray-400">${fmtDate(s.created_at)}</p>
        <div class="flex gap-2 mt-2 justify-end">
          ${canAssume && s.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="assumeShip('${s.id}')"><i class="fas fa-hand-paper mr-1"></i>Assumir</button>` : ''}

  </div>`;
}

        <button class="btn btn-outline flex-1" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary flex-1" onclick="submitDespesa()"><i class="fas fa-paper-plane mr-1"></i>Enviar Solicitação</button>
      </div>
    </div>
  `, true);
}

async function submitDespesa() {
  const solicitante   = document.getElementById('dSolicitante').value.trim();
  const data_sol      = document.getElementById('dDataSol').value;
  const beneficiario  = document.getElementById('dBenef').value.trim();
  const valor         = document.getElementById('dValor').value;
  const forma         = document.getElementById('dForma').value;

  if (!solicitante || !beneficiario || !valor || !forma) {
    alert('Preencha os campos obrigatórios: Solicitante, Beneficiário, Valor e Forma de Pagamento.');
    return;
  }

  const competenciaRaw = document.getElementById('dCompetencia').value;
  const competencia    = competenciaRaw ? competenciaRaw.slice(5,7) + '/' + competenciaRaw.slice(0,4) : '';

  const body = {
    solicitante,
    data_solicitacao:   data_sol,
    centro_custo:       document.getElementById('dCentro').value.trim(),
    processo:           document.getElementById('dProcesso').value.trim(),
    classificacao_fin:  document.getElementById('dClassif').value.trim(),
    competencia,
    pagamento_ref:      document.getElementById('dPagRef').value.trim(),
    valor:              parseFloat(valor),
    beneficiario,
    cpf_cnpj:           document.getElementById('dCpfCnpj').value.trim(),
    forma_pagamento:    forma,
    emite_nota_fiscal:  document.getElementById('dNota').value || null,
    titular:            document.getElementById('dTitular').value.trim(),
    banco:              document.getElementById('dBanco').value.trim(),
    agencia:            document.getElementById('dAgencia').value.trim(),
    conta:              document.getElementById('dConta').value.trim(),
    pix_chave:          document.getElementById('dPix').value.trim(),
    data_limite_pag:    document.getElementById('dDataLim').value || null,
    obs:                document.getElementById('dObs').value.trim(),
  };

  const r = await apiPost('/expenses.php', body);
  if (!r.ok) { alert(r.data.detail || 'Erro ao criar solicitação'); return; }

  closeModal(); renderDespesas();
}

async function approveExp(id) {
  if (!confirm('Aprovar esta despesa?')) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=approve`, {});
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}

async function rejectExp(id) {
  const reason = prompt('Motivo da rejeição:');
  if (reason === null) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=reject`, { reason });
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}

async function releaseExp(id) {
  if (!confirm('Liberar pagamento desta despesa?')) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=release`, {});
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}

// ================================================
// VIEW: RELATÓRIOS
// ================================================
async function renderRelatorios() {
  loading();
  const [cR, sR, eR] = await Promise.all([
    apiGet('/calls.php'), apiGet('/shipments.php'), apiGet('/expenses.php')
  ]);

  const calls = cR.ok ? cR.data : [];
  const ships = sR.ok ? sR.data : [];
  const exps  = eR.ok ? eR.data : [];

  const countBy = (arr, key, val) => arr.filter(i => i[key] === val).length;
  const sumBy   = (arr, key) => arr.reduce((s, i) => s + parseFloat(i[key]||0), 0);

  setView(`
    <div class="grid md:grid-cols-3 gap-4 mb-6">
      ${statCard('Total Chamados',     calls.length,  'fa-bell',        '#1e3a5f','#e0e7ff')}
      ${statCard('Total Envios',       ships.length,  'fa-box',         '#10b981','#d1fae5')}
      ${statCard('Total Despesas (R$)',fmtMoney(sumBy(exps,'amount')),'fa-dollar-sign','#ef4444','#fee2e2')}
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <!-- Chamados por status -->
      <div class="card p-5">
        <h3 class="font-bold text-gray-800 mb-4">Chamados por Status</h3>
        ${['pending','in_progress','completed','cancelled'].map(s => `
          <div class="flex justify-between items-center py-2 border-b last:border-0">
            <span class="badge badge-${badgeClass(s)}">${STATUS_LABELS[s]}</span>
            <span class="font-bold text-gray-800">${countBy(calls,'status',s)}</span>
          </div>`).join('')}
      </div>

      <!-- Despesas por status -->
      <div class="card p-5">
        <h3 class="font-bold text-gray-800 mb-4">Despesas por Status</h3>
        ${['pending','approved','released','rejected'].map(s => `
          <div class="flex justify-between items-center py-2 border-b last:border-0">
            <span class="badge badge-${badgeClass(s)}">${STATUS_LABELS[s]}</span>
            <span class="font-bold text-gray-800">${countBy(exps,'status',s)}</span>
          </div>`).join('')}
        <div class="flex justify-between items-center pt-3 font-bold">
          <span class="text-gray-600">Total Liberado</span>
          <span class="text-green-600">${fmtMoney(sumBy(exps.filter(e=>e.status==='released'),'amount'))}</span>
        </div>
      </div>
    </div>

    <!-- Tabela de despesas -->
    <div class="card p-5">
      <h3 class="font-bold text-gray-800 mb-4">Extrato de Despesas</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b text-left text-gray-500">
              <th class="pb-2 pr-3">Data</th>
              <th class="pb-2 pr-3">Beneficiário</th>
              <th class="pb-2 pr-3">Referência</th>
              <th class="pb-2 pr-3">Forma Pag.</th>
              <th class="pb-2 pr-3">Valor</th>
              <th class="pb-2">Status</th>
            </tr>
          </thead>
          <tbody>
            ${exps.map(e => `
              <tr class="border-b hover:bg-gray-50">
                <td class="py-2 pr-3 text-gray-400">${fmtDateOnly(e.data_solicitacao||e.created_at)}</td>
                <td class="py-2 pr-3 font-semibold text-gray-800">${escHtml(e.beneficiario||e.created_by_name)}</td>
                <td class="py-2 pr-3 text-gray-500">${escHtml(e.description||'-')}</td>
                <td class="py-2 pr-3 text-gray-500">${e.forma_pagamento||'-'}</td>
                <td class="py-2 pr-3 font-bold text-gray-800">${fmtMoney(e.amount)}</td>
                <td class="py-2"><span class="badge badge-${badgeClass(e.status)}">${STATUS_LABELS[e.status]||e.status}</span></td>
              </tr>`).join('') || '<tr><td colspan="6" class="py-4 text-center text-gray-400">Nenhuma despesa</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `);
}

// ================================================
// VIEW: USUÁRIOS
// ================================================
async function renderUsuarios() {
  loading();
  const r = await apiGet('/users.php');
  if (!r.ok) { setView('<p class="text-red-500">Erro ao carregar usuários.</p>'); return; }

  const users = r.data;

  setView(`
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-gray-700">${users.length} usuários cadastrados</h3>
      <button class="btn btn-primary btn-sm" onclick="openUserForm()"><i class="fas fa-plus mr-1"></i>Novo Usuário</button>
    </div>
    <div class="card overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-500">
            <th class="px-4 py-3">Nome</th>
            <th class="px-4 py-3">E-mail</th>
            <th class="px-4 py-3">Perfil</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Ação</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(u => `
            <tr class="border-b hover:bg-gray-50">
              <td class="px-4 py-3 font-semibold text-gray-800">${escHtml(u.name)}</td>
              <td class="px-4 py-3 text-gray-500">${escHtml(u.email)}</td>
              <td class="px-4 py-3"><span class="badge" style="background:#e0e7ff;color:#3730a3">${ROLE_LABELS[u.role]||u.role}</span></td>
              <td class="px-4 py-3">
                <span class="badge ${u.is_active ? 'badge-progress' : 'badge-rejected'}">${u.is_active ? 'Ativo' : 'Inativo'}</span>
              </td>
              <td class="px-4 py-3">
                <button class="btn btn-outline btn-sm" onclick="toggleUser('${u.id}','${u.name}',${u.is_active})">
                  ${u.is_active ? 'Desativar' : 'Ativar'}
                </button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `);
}

function openUserForm() {
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-gray-800">Novo Usuário</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="uName" class="form-input" placeholder="Nome do usuário">
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="uEmail" class="form-input" placeholder="usuario@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" id="uPassword" class="form-input" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label class="form-label">Perfil</label>
        <select id="uRole" class="form-input">
          ${Object.entries(ROLE_LABELS).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div class="flex gap-3 mt-4">
        <button class="btn btn-outline flex-1" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary flex-1" onclick="submitUser()">Cadastrar</button>
      </div>
    </div>
  `);
}

async function submitUser() {
  const name     = document.getElementById('uName').value.trim();
  const email    = document.getElementById('uEmail').value.trim();
  const password = document.getElementById('uPassword').value;
  const role     = document.getElementById('uRole').value;

  if (!name || !email || !password) { alert('Preencha todos os campos.'); return; }

  const r = await apiPost('/auth.php?action=register', { name, email, password, role });
  if (!r.ok) { alert(r.data.detail || 'Erro ao criar usuário'); return; }

  closeModal(); renderUsuarios();
}

async function toggleUser(id, name, isActive) {
  const action = isActive ? 'desativar' : 'ativar';
  if (!confirm(`Deseja ${action} o usuário ${name}?`)) return;
  const r = await apiPut(`/users.php?id=${id}`, {});
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderUsuarios();
}

// ================================================
// MODAL
// ================================================
function openModal(content, large = false) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-backdrop" onclick="backdropClose(event)">
      <div class="modal ${large ? 'modal-lg' : ''}">${content}</div>
    </div>`;
}

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function backdropClose(e) {
  if (e.target.classList.contains('modal-backdrop')) closeModal();
}

// ================================================
// HELPERS
// ================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(dt) {
  if (!dt) return '-';
  return new Date(dt).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtDateOnly(dt) {
  if (!dt) return '-';
  const d = new Date(dt + (dt.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('pt-BR');
}

function fmtMoney(val) {
  return 'R$ ' + parseFloat(val||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

function today() {
  return new Date().toISOString().slice(0,10);
}

function badgeClass(status) {
  const map = { pending:'pending', in_progress:'progress', completed:'completed', approved:'approved', rejected:'rejected', released:'released', cancelled:'completed' };
  return map[status] || 'pending';
}

// ================================================
// INIT
// ================================================
(function init() {
  const token = localStorage.getItem('nto_token');
  const user  = localStorage.getItem('nto_user');
  if (token && user) {
    try {
      state.token = token;
      state.user  = JSON.parse(user);
      enterApp();
      return;
    } catch(e) {}
  }
  // Show login
  document.getElementById('loginPage').classList.remove('hidden');
})();
</script>
