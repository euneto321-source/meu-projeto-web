<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTO Logística - Laboratórios Medclin</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
body { background: #f1f5f9; }

.sidebar { background: linear-gradient(180deg, #1a3550 0%, #0b1a2a 100%); min-height: 100vh; width: 240px; flex-shrink: 0; }
.sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,0.65); border-radius: 8px; margin: 2px 8px; cursor: pointer; transition: all .2s; font-size: 14px; }
.sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.12); }
.sidebar-link i { width: 18px; text-align: center; }

.card { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-pending   { background: #fef3c7; color: #92400e; }
.badge-progress  { background: #d1fae5; color: #065f46; }
.badge-completed { background: #e0e7ff; color: #3730a3; }
.badge-approved  { background: #d1fae5; color: #065f46; }
.badge-rejected  { background: #fee2e2; color: #991b1b; }
.badge-released  { background: #dbeafe; color: #1e40af; }

.call-card { border-left: 4px solid #fbbf24; transition: all .2s; }
.call-card.in_progress { border-left-color: #10b981; background: #f0fdf4; }
.call-card.completed   { border-left-color: #6366f1; opacity: .7; }
.call-card.emergency   { border-left-color: #ef4444; }
.call-card.urgent      { border-left-color: #f97316; }

.stat-card { background: #fff; border-radius: 14px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
.form-input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; background: #fff; }
.form-input:focus { border-color: #1a3550; box-shadow: 0 0 0 2px rgba(26,53,80,.1); }

.btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #1a3550; color: #fff; }
.btn-primary:hover { background: #0b1a2a; }
.btn-success { background: #10b981; color: #fff; }
.btn-success:hover { background: #059669; }
.btn-danger  { background: #ef4444; color: #fff; }
.btn-danger:hover  { background: #dc2626; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-outline { background: transparent; border: 1.5px solid #1a3550; color: #1a3550; }
.btn-outline:hover { background: #f0f4f8; }
.btn-tv { background: #7c3aed; color: #fff; }
.btn-tv:hover { background: #6d28d9; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: #fff; border-radius: 16px; width: 100%; max-width: 580px; max-height: 92vh; overflow-y: auto; }
.modal-lg { max-width: 740px; }

.avisos-box { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px; padding: 16px; margin-top: 16px; }
.avisos-box h4 { font-weight: 700; color: #92400e; margin-bottom: 8px; font-size: 13px; }
.avisos-box li { font-size: 12px; color: #78350f; margin-bottom: 4px; line-height: 1.5; }

/* TV Panel */
#tvPanel { display: none; position: fixed; inset: 0; background: #060f1a; z-index: 200; overflow: hidden; flex-direction: column; }
.tv-card-pending  { background: #1c2a1a; border: 2px solid #fbbf24; border-radius: 12px; padding: 16px; }
.tv-card-progress { background: #0d2a1a; border: 2px solid #10b981; border-radius: 12px; padding: 16px; }
@keyframes tv-blink { 0%,100%{opacity:1}50%{opacity:.4} }
.tv-blink { animation: tv-blink 1.5s ease-in-out infinite; }

#soundIndicator { position: fixed; top: 16px; right: 16px; background: #ef4444; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 300; display: none; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="soundIndicator"><i class="fas fa-bell mr-2"></i>Chamados Pendentes</div>

<!-- ================================================
     LOGIN PAGE
================================================ -->
<div id="loginPage" class="hidden min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0b1a2a 0%, #1a3550 50%, #0b1a2a 100%);">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <img src="Logo-Menu.webp" alt="Medclin" class="h-20 mx-auto mb-3 object-contain" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
      <div id="logoFallback" style="display:none" class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white shadow-lg mb-3">
        <i class="fas fa-truck-medical text-blue-900 text-3xl"></i>
      </div>
      <h1 class="text-white text-xl font-bold leading-tight">NTO Logística Laboratorial</h1>
      <p class="text-blue-300 text-sm mt-1">Laboratórios Medclin</p>
    </div>

    <div class="card p-6">
      <h2 class="text-gray-800 font-bold text-base mb-4">Acesso ao Sistema</h2>
      <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="seu@email.com">
      </div>
      <div class="form-group">

        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">

      <button class="btn btn-primary w-full mt-1" style="justify-content:center" onclick="doLogin()">

      <div class="mt-3 pt-3 border-t">
        <button class="btn btn-tv w-full" style="justify-content:center" onclick="openTV()">
          <i class="fas fa-tv"></i> Painel de TV
        </button>
      </div>
    </div>

    <p class="text-center text-blue-400 text-xs mt-5">Desenvolvido por <span class="text-white font-semibold">CRSystems</span></p>
  </div>
</div>

<!-- ================================================
     PAINEL DE TV
================================================ -->
<div id="tvPanel">
  <!-- Header TV -->
  <div class="flex items-center justify-between px-6 py-3 border-b border-blue-900">
    <div class="flex items-center gap-4">
      <img src="Logo-Menu.webp" alt="Medclin" class="h-12 object-contain" onerror="this.style.display='none'">
      <div>
        <div class="text-white text-xl font-bold">NTO Logística Laboratorial</div>
        <div class="text-blue-400 text-sm">Laboratórios Medclin — Painel Operacional</div>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right">
        <div class="text-white text-2xl font-bold font-mono" id="tvClock"></div>
        <div class="text-blue-400 text-xs" id="tvDate"></div>
      </div>
      <button class="btn btn-outline text-white border-white hover:bg-blue-900 btn-sm" onclick="closeTV()">
        <i class="fas fa-times"></i> Fechar
      </button>
    </div>
  </div>

  <!-- TV Content -->
  <div class="flex-1 overflow-hidden grid grid-cols-2 gap-0 h-full" style="height: calc(100vh - 68px)">
    <!-- Chamados -->
    <div class="border-r border-blue-900 flex flex-col overflow-hidden">
      <div class="px-5 py-3 border-b border-blue-900 flex items-center justify-between">
        <h2 class="text-white font-bold text-lg"><i class="fas fa-bell text-yellow-400 mr-2"></i>Chamados — Retirada de Amostras</h2>
        <span id="tvCallsCount" class="badge" style="background:#1a3550;color:#93c5fd;font-size:13px"></span>
      </div>
      <div id="tvCallsList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>

    <!-- Envios/Retiradas -->
    <div class="flex flex-col overflow-hidden">
      <div class="px-5 py-3 border-b border-blue-900 flex items-center justify-between">
        <h2 class="text-white font-bold text-lg"><i class="fas fa-box text-blue-400 mr-2"></i>Envios / Retiradas</h2>
        <span id="tvShipsCount" class="badge" style="background:#1a3550;color:#93c5fd;font-size:13px"></span>
      </div>
      <div id="tvShipsList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>
  </div>
</div>

<!-- ================================================
     MAIN APP
================================================ -->
<div id="mainApp" class="hidden flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="sidebar flex flex-col">
    <div class="p-3 border-b border-blue-900">
      <img src="Logo-Menu.webp" alt="Medclin" class="h-14 w-full object-contain" onerror="this.style.display='none';document.getElementById('sidebarLogoFallback').style.display='flex'">
      <div id="sidebarLogoFallback" style="display:none" class="flex items-center gap-2 px-1">
        <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
          <i class="fas fa-truck-medical text-white"></i>
        </div>
        <div>
          <div class="text-white font-bold text-sm">NTO Logística</div>
          <div class="text-blue-300 text-xs">Medclin</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 py-3 overflow-y-auto" id="sidebarNav"></nav>

    <div class="p-3 border-t border-blue-900">
      <div class="flex items-center gap-2 mb-2 px-2">
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold flex-shrink-0" id="userAvatar"></div>
        <div class="flex-1 min-w-0">
          <div class="text-white text-sm font-semibold truncate" id="userName"></div>
          <div class="text-blue-300 text-xs truncate" id="userRole"></div>
        </div>
      </div>
      <button class="sidebar-link w-full" onclick="openTV()">
        <i class="fas fa-tv"></i> Painel de TV
      </button>
      <button class="sidebar-link w-full" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
      <p class="text-blue-600 text-center text-xs mt-2">CRSystems</p>
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 overflow-y-auto">
    <div class="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
      <div>
        <h2 class="font-bold text-gray-800" id="pageTitle">Dashboard</h2>
        <p class="text-gray-400 text-xs" id="pageSubtitle"></p>
      </div>
      <span class="text-gray-400 text-sm font-mono" id="clockDisplay"></span>
    </div>
    <div class="p-6" id="viewContainer">
      <div class="flex items-center justify-center h-64 text-gray-400">
        <div class="text-center"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Carregando...</p></div>
      </div>
    </div>
  </div>
</div>

<div id="modalContainer"></div>

<script>
// ================================================
// ESTADO
// ================================================
const API = '/api';
let state = {
  user: null, token: null, view: 'dashboard',
  pendingCallIds: new Set(), pendingShipIds: new Set(), pendingExpIds: new Set(),
  soundInterval: null, pollInterval: null, tvInterval: null, hasPendingCalls: false,
  locations: [],
};

const ROLE_LABELS = { admin:'Administrador', driver:'Motorista', emergency:'Unidade de Emergência', sector:'Setor Interno', approval:'Aprovador', financial:'Financeiro' };
const STATUS_LABELS = { pending:'Pendente', in_progress:'Em Andamento', completed:'Concluído', cancelled:'Cancelado', approved:'Aprovado', rejected:'Rejeitado', released:'Liberado' };
const PRIORITY_LABELS = { normal:'Normal', urgent:'Urgente', emergency:'Emergência' };

// ================================================
// CLOCK
// ================================================
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('pt-BR');
  const d = now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  const el = document.getElementById('clockDisplay');
  if (el) el.textContent = t;
  const tc = document.getElementById('tvClock');
  if (tc) tc.textContent = t;
  const td = document.getElementById('tvDate');
  if (td) td.textContent = d.charAt(0).toUpperCase() + d.slice(1);
}
setInterval(updateClock, 1000);
updateClock();

// ================================================
// SOUND
// ================================================
function playBeep(freq = 880, dur = 180) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
    osc.start(); osc.stop(ctx.currentTime + dur/1000);
  } catch(e) {}
}
function playNotification() { playBeep(880,150); setTimeout(()=>playBeep(1100,200),200); }
function playDoubleBeep()    { playBeep(660,200); setTimeout(()=>playBeep(660,200),300); }

function startPendingCallsSound() {
  if (state.soundInterval) return;
  playNotification();
  document.getElementById('soundIndicator').style.display = 'block';
  state.soundInterval = setInterval(() => {
    if (state.hasPendingCalls) playNotification(); else stopPendingCallsSound();
  }, 3 * 60 * 1000);
}
function stopPendingCallsSound() {
  clearInterval(state.soundInterval); state.soundInterval = null;
  document.getElementById('soundIndicator').style.display = 'none';
}

// ================================================
// API
// ================================================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const res  = await fetch(API + path, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  const text = await res.text();
  try { return { ok: res.ok, status: res.status, data: JSON.parse(text) }; }
  catch { return { ok: res.ok, status: res.status, data: { detail: text } }; }
}
const apiGet  = p      => api(p);
const apiPost = (p,b)  => api(p, { method:'POST', body: JSON.stringify(b) });
const apiPut  = (p,b)  => api(p, { method:'PUT',  body: JSON.stringify(b) });

// ================================================
// AUTH
// ================================================
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.classList.add('hidden');
  if (!email || !password) { showLoginError('Preencha e-mail e senha.'); return; }
  const r = await apiPost('/auth.php?action=login', { email, password });
  if (!r.ok) { showLoginError(r.data.detail || 'Credenciais inválidas'); return; }
  state.token = r.data.token;
  state.user  = r.data.user;
  localStorage.setItem('nto_token', state.token);
  localStorage.setItem('nto_user',  JSON.stringify(state.user));
  enterApp();
}
function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.classList.remove('hidden');
}
function doLogout() {
  state.token = null; state.user = null;
  stopPendingCallsSound();
  clearInterval(state.pollInterval);
  clearInterval(state.tvInterval);
  localStorage.removeItem('nto_token');
  localStorage.removeItem('nto_user');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('tvPanel').style.display = 'none';
}
function enterApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userAvatar').textContent = state.user.name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent   = state.user.name;
  document.getElementById('userRole').textContent   = ROLE_LABELS[state.user.role] || state.user.role;
  loadLocations();
  renderNav();
  navigateTo(defaultView());
  startPolling();
}
function defaultView() {
  const r = state.user.role;
  if (r === 'driver')    return 'chamados';
  if (r === 'emergency') return 'chamados';
  if (r === 'sector')    return 'envios';
  if (r === 'approval')  return 'despesas';
  if (r === 'financial') return 'despesas';
  return 'dashboard';
}

// ================================================
// LOCATIONS — carrega do banco
// ================================================
async function loadLocations() {
  const r = await apiGet('/locations.php');
  if (r.ok) state.locations = r.data;
}
function locationOptions(type) {
  const filtered = type ? state.locations.filter(l => l.type === type) : state.locations;
  const all = filtered.map(l => `<option value="${escHtml(l.name)}">${escHtml(l.name)}</option>`).join('');
  return `<option value="">Selecione ou digite...</option>` + all;
}

// ================================================
// TV PANEL
// ================================================
function openTV() {
  const panel = document.getElementById('tvPanel');
  panel.style.display = 'flex';
  refreshTV();
  clearInterval(state.tvInterval);
  state.tvInterval = setInterval(refreshTV, 30000);
}
function closeTV() {
  document.getElementById('tvPanel').style.display = 'none';
  clearInterval(state.tvInterval);
}

async function refreshTV() {
  const [cr, sr] = await Promise.all([
    fetch(API + '/calls.php?action=pending').then(r=>r.json()).catch(()=>[]),
    fetch(API + '/shipments.php?action=pending').then(r=>r.json()).catch(()=>[])
  ]);

  const calls = Array.isArray(cr) ? cr : [];
  const ships = Array.isArray(sr) ? sr : [];
  const pending = calls.filter(c => c.status === 'pending');
  const inProg  = calls.filter(c => c.status === 'in_progress');

  document.getElementById('tvCallsCount').textContent = `${calls.length} ativo(s)`;
  document.getElementById('tvShipsCount').textContent = `${ships.length} ativo(s)`;

  // Sound for pending calls on TV
  if (pending.length > 0) {
    const newIds = pending.map(c=>c.id);
    const hasNew = newIds.some(id => !state.pendingCallIds.has(id));
    if (hasNew) playNotification();
    state.pendingCallIds = new Set(newIds);
    state.hasPendingCalls = true;
    if (!state.soundInterval) startPendingCallsSound();
  } else {
    state.hasPendingCalls = false;
    stopPendingCallsSound();
  }

  // Render calls
  document.getElementById('tvCallsList').innerHTML = calls.length === 0
    ? `<div class="text-center text-blue-600 mt-10 text-lg opacity-50"><i class="fas fa-check-circle text-4xl mb-3 block"></i>Nenhum chamado ativo</div>`
    : calls.map(c => {
        const prog = c.status === 'in_progress';
        const cls  = prog ? 'tv-card-progress' : 'tv-card-pending';
        const prio = c.priority !== 'normal' ? `<span class="ml-2 text-xs px-2 py-0.5 rounded-full" style="background:#7f1d1d;color:#fca5a5">${PRIORITY_LABELS[c.priority]}</span>` : '';
        return `<div class="${cls}">
          <div class="flex items-center justify-between mb-1">
            <span class="text-white font-bold text-base">${escHtml(c.origin_name)}</span>
            <span class="${prog ? 'text-green-400' : 'text-yellow-400 tv-blink'} font-bold text-sm">● ${prog ? 'Em Andamento' : 'Aguardando'}</span>
          </div>
          <div class="text-blue-300 text-sm mb-1"><i class="fas fa-tag mr-1"></i>Retirada de Amostras${prio}</div>
          ${c.description ? `<div class="text-gray-400 text-sm">${escHtml(c.description)}</div>` : ''}
          ${prog ? `<div class="text-green-300 text-sm mt-1 font-semibold"><i class="fas fa-user mr-1"></i>${escHtml(c.assigned_driver_name||'')}</div>` : ''}
          <div class="text-gray-500 text-xs mt-1">${fmtDate(c.created_at)}</div>
        </div>`;
      }).join('');

  // Render shipments
  document.getElementById('tvShipsList').innerHTML = ships.length === 0
    ? `<div class="text-center text-blue-600 mt-10 text-lg opacity-50"><i class="fas fa-check-circle text-4xl mb-3 block"></i>Nenhuma demanda ativa</div>`
    : ships.map(s => {
        const prog = s.status === 'in_progress';
        const cls  = prog ? 'tv-card-progress' : 'tv-card-pending';
        const tipo = s.type === 'send' ? 'Envio' : 'Retirada';
        return `<div class="${cls}">
          <div class="flex items-center justify-between mb-1">
            <span class="text-white font-bold text-base">${escHtml(s.origin_sector)}</span>
            <span class="${prog ? 'text-green-400' : 'text-yellow-400 tv-blink'} font-bold text-sm">● ${prog ? 'Em Andamento' : 'Aguardando'}</span>
          </div>
          <div class="text-blue-300 text-sm mb-1">
            <i class="fas fa-arrow-right mr-1"></i>${escHtml(s.destination_name)}
            <span class="ml-2 text-xs px-2 py-0.5 rounded-full" style="background:#1e3a5f;color:#93c5fd">${tipo}</span>
          </div>
          ${s.description ? `<div class="text-gray-400 text-sm">${escHtml(s.description)}</div>` : ''}
          ${prog ? `<div class="text-green-300 text-sm mt-1 font-semibold"><i class="fas fa-user mr-1"></i>${escHtml(s.assigned_driver_name||'')}</div>` : ''}
          <div class="text-gray-500 text-xs mt-1">${fmtDate(s.created_at)}</div>
        </div>`;
      }).join('');
}

// ================================================
// NAVIGATION
// ================================================
const NAV_ITEMS = [
  { id:'dashboard', label:'Dashboard',         icon:'fa-chart-bar',   roles:['admin'] },
  { id:'chamados',  label:'Chamados',           icon:'fa-bell',        roles:['admin','driver','emergency'] },
  { id:'envios',    label:'Envios / Retiradas', icon:'fa-box',         roles:['admin','driver','sector'] },
  { id:'despesas',  label:'Despesas',           icon:'fa-dollar-sign', roles:['admin','sector','approval','financial'] },
  { id:'relatorios',label:'Relatórios',         icon:'fa-file-alt',    roles:['admin','approval','financial'] },

function navigateTo(view) {
  state.view = view;
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + view);
  if (el) el.classList.add('active');
  const titles = {
    dashboard: ['Dashboard','Visão geral'],
    chamados:  ['Chamados','Retirada de Amostras'],
    envios:    ['Envios / Retiradas','Demandas de logística'],
    despesas:  ['Despesas','Solicitações financeiras'],
    relatorios:['Relatórios','Análises'],
    usuarios:  ['Usuários','Gerenciamento de acesso'],
  };
  const [title, sub] = titles[view] || ['',''];
  document.getElementById('pageTitle').textContent    = title;
  document.getElementById('pageSubtitle').textContent = sub;
  const views = { dashboard:renderDashboard, chamados:renderChamados, envios:renderEnvios, despesas:renderDespesas, relatorios:renderRelatorios, usuarios:renderUsuarios };
  if (views[view]) views[view]();
}

// ================================================
// POLLING
// ================================================
function startPolling() {
  clearInterval(state.pollInterval);
  state.pollInterval = setInterval(poll, 10000);
  poll();
}
async function poll() {
  const role = state.user?.role;
  if (!role) return;

  if (['admin','driver','emergency'].includes(role)) {
    const r = await apiGet('/calls.php?action=pending');
    if (r.ok) {
      const pending = r.data.filter(c => c.status === 'pending');
      const newIds  = pending.map(c => c.id);
      const isNew   = newIds.some(id => !state.pendingCallIds.has(id));
      state.hasPendingCalls = pending.length > 0;
      if (pending.length > 0 && ['admin','driver'].includes(role)) {
        if (isNew || !state.soundInterval) startPendingCallsSound();
      } else { stopPendingCallsSound(); }
      state.pendingCallIds = new Set(newIds);
    }
  }
  if (['admin','driver','sector'].includes(role)) {
    const r = await apiGet('/shipments.php?action=pending');
    if (r.ok) {
      const pending = r.data.filter(s => s.status === 'pending');
      const isNew   = pending.some(s => !state.pendingShipIds.has(s.id));
      if (isNew && ['admin','driver'].includes(role)) playDoubleBeep();
      state.pendingShipIds = new Set(pending.map(s => s.id));
    }
  }
  if (['admin','approval','financial'].includes(role)) {
    const r = await apiGet('/expenses.php?status=pending');
    if (r.ok) {
      const pending = r.data.filter(e => e.status === 'pending');
      const isNew   = pending.some(e => !state.pendingExpIds.has(e.id));
      if (isNew) playDoubleBeep();
      state.pendingExpIds = new Set(pending.map(e => e.id));
    }
  }
}

async function submitDespesa() {
  const competenciaRaw = document.getElementById('dCompetencia').value;
  const competencia    = competenciaRaw ? competenciaRaw.slice(5,7)+'/'+competenciaRaw.slice(0,4) : null;
  const valor          = document.getElementById('dValor').value;

  const body = {
    solicitante:       document.getElementById('dSolicitante').value.trim() || null,
    data_solicitacao:  document.getElementById('dDataSol').value || null,
    centro_custo:      document.getElementById('dCentro').value.trim() || null,
    processo:          document.getElementById('dProcesso').value.trim() || null,
    classificacao_fin: document.getElementById('dClassif').value.trim() || null,
    competencia,
    pagamento_ref:     document.getElementById('dPagRef').value.trim() || null,
    valor:             valor ? parseFloat(valor) : 0,
    beneficiario:      document.getElementById('dBenef').value.trim() || null,
    cpf_cnpj:          document.getElementById('dCpfCnpj').value.trim() || null,
    forma_pagamento:   document.getElementById('dForma').value || null,
    emite_nota_fiscal: document.getElementById('dNota').value || null,
    titular:           document.getElementById('dTitular').value.trim() || null,
    banco:             document.getElementById('dBanco').value.trim() || null,
    agencia:           document.getElementById('dAgencia').value.trim() || null,
    conta:             document.getElementById('dConta').value.trim() || null,
    pix_chave:         document.getElementById('dPix').value.trim() || null,
    data_limite_pag:   document.getElementById('dDataLim').value || null,
    obs:               document.getElementById('dObs').value.trim() || null,
  };

  const r = await apiPost('/expenses.php', body);
  if (!r.ok) { alert(r.data.detail || 'Erro ao enviar solicitação'); return; }
  closeModal(); renderDespesas();
}

async function approveExp(id) {
  if (!confirm('Aprovar esta despesa?')) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=approve`, {});
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}
async function rejectExp(id) {
  const reason = prompt('Motivo da rejeição:');
  if (reason === null) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=reject`, { reason });
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}
async function releaseExp(id) {
  if (!confirm('Liberar pagamento?')) return;
  const r = await apiPut(`/expenses.php?id=${id}&action=release`, {});
  if (!r.ok) { alert(r.data.detail || 'Erro'); return; }
  renderDespesas();
}

  if (!name||!email||!password) { alert('Preencha todos os campos.'); return; }
  const r = await apiPost('/auth.php?action=register', {name,email,password,role});
  if (!r.ok) { alert(r.data.detail||'Erro ao criar usuário'); return; }
  closeModal(); renderUsuarios();

  if (!confirm(`${isActive?'Desativar':'Ativar'} o usuário ${name}?`)) return;
  const r = await apiPut(`/users.php?id=${id}`, {});
  if (!r.ok) { alert(r.data.detail||'Erro'); return; }

// ================================================
// MODAL

function openModal(content, large=false) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-backdrop" onclick="backdropClose(event)">
      <div class="modal ${large?'modal-lg':''}">${content}</div>
    </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
function backdropClose(e) { if (e.target.classList.contains('modal-backdrop')) closeModal(); }

// ================================================
// HELPERS
// ================================================
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(dt) {
  if (!dt) return '-';
  return new Date(dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateOnly(dt) {
  if (!dt) return '-';
  const d = new Date(dt + (dt.length===10?'T00:00:00':''));
  return d.toLocaleDateString('pt-BR');
}
function fmtMoney(v) {
  return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function today() { return new Date().toISOString().slice(0,10); }
function badgeClass(s) {
  return {pending:'pending',in_progress:'progress',completed:'completed',approved:'approved',rejected:'rejected',released:'released',cancelled:'completed'}[s]||'pending';
}

(function init() {
  const token = localStorage.getItem('nto_token');
  const user  = localStorage.getItem('nto_user');
  if (token && user) {
    try { state.token=token; state.user=JSON.parse(user); enterApp(); return; } catch(e) {}
  }
  document.getElementById('loginPage').classList.remove('hidden');
})();
